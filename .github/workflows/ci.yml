name: DevOps Assignment CI

on:

  push:

    branches:
      - main

  pull_request:

jobs:

  terraform:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout

        uses: actions/checkout@v4


      - name: Install Terraform

        uses: hashicorp/setup-terraform@v3


      - name: Terraform Format

        run: |

          cd terraform

          terraform fmt -check


      - name: Terraform Validate

        run: |

          cd terraform

          terraform init

          terraform validate


  janitor:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout

        uses: actions/checkout@v4


      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.12"


      - name: Install Dependencies

        run: |

          pip install -r janitor/requirements.txt


      - name: Run Janitor Dry Run

        run: |

          cd janitor

          python janitor.py --dry-run
